<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script th:src="@{/js/theme.js}"></script>
    <meta charset="UTF-8">
    <title>Audit Log | SAMS</title>
    <link rel="stylesheet" th:href="@{/css/sams-global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        table{width:100%;border-collapse:collapse;}
        th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--input-border);font-size:14px;}
        th{color:var(--text-muted);font-weight:600;}
        .table-card{background:var(--surface-bg);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
        .badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;}
        .badge-add{background:#dcfce7;color:#16a34a;}
        .badge-delete{background:#fee2e2;color:#dc2626;}
        .badge-edit{background:#fef9c3;color:#ca8a04;}
        .badge-login{background:#ede9fe;color:#4f46e5;}
        .badge-default{background:#f3f4f6;color:#555;}
        .clear-btn{padding:10px 20px;background:#fee2e2;color:#dc2626;border:none;border-radius:8px;cursor:pointer;font-weight:600;}
        .search-box{margin-bottom:16px;}
        .search-box input{width:100%;padding:10px 14px;border:1px solid var(--input-border);border-radius:8px;font-size:14px;background:var(--surface-bg);color:var(--text-body);box-sizing:border-box;}
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="topbar">
            <div><h1>📋 Audit Log</h1><p>Track all actions performed in the system</p></div>
            <form th:action="@{/audit-log/clear}" method="post"
                  onsubmit="return confirm('Clear all audit logs? This cannot be undone.')">
                <button type="submit" class="clear-btn"><i class="fas fa-trash"></i> Clear All</button>
            </form>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by user, action or module..."
                   oninput="filterTable()">
        </div>

        <div class="table-card">
            <table>
                <thead>
                <tr>
                    <th>Time</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Module</th>
                    <th>Details</th>
                </tr>
                </thead>
                <tbody id="logBody">
                <tr th:if="${#lists.isEmpty(logs)}">
                    <td colspan="5" style="text-align:center;padding:40px;color:#888;">
                        <i class="fas fa-clipboard-list" style="font-size:36px;display:block;margin-bottom:10px;opacity:0.3;"></i>
                        No audit logs yet. Actions will appear here automatically.
                    </td>
                </tr>
                <tr th:each="l : ${logs}"
                    th:attr="data-search=${#strings.toLowerCase((l.username!=null?l.username:'') + ' ' + (l.action!=null?l.action:'') + ' ' + (l.module!=null?l.module:'') + ' ' + (l.details!=null?l.details:''))}">
                    <td th:text="${l.timestamp != null ? l.timestamp : '—'}">—</td>
                    <td><strong th:text="${l.username != null ? l.username : '—'}">—</strong></td>
                    <td>
                            <span th:if="${l.action != null and #strings.containsIgnoreCase(l.action, 'add')}"
                                  class="badge badge-add" th:text="${l.action}">—</span>
                        <span th:if="${l.action != null and #strings.containsIgnoreCase(l.action, 'delete')}"
                              class="badge badge-delete" th:text="${l.action}">—</span>
                        <span th:if="${l.action != null and (#strings.containsIgnoreCase(l.action, 'edit') or #strings.containsIgnoreCase(l.action, 'update'))}"
                              class="badge badge-edit" th:text="${l.action}">—</span>
                        <span th:if="${l.action != null and #strings.containsIgnoreCase(l.action, 'login')}"
                              class="badge badge-login" th:text="${l.action}">—</span>
                        <span th:if="${l.action == null or (!#strings.containsIgnoreCase(l.action,'add') and !#strings.containsIgnoreCase(l.action,'delete') and !#strings.containsIgnoreCase(l.action,'edit') and !#strings.containsIgnoreCase(l.action,'update') and !#strings.containsIgnoreCase(l.action,'login'))}"
                              class="badge badge-default" th:text="${l.action != null ? l.action : '—'}">—</span>
                    </td>
                    <td th:text="${l.module != null ? l.module : '—'}">—</td>
                    <td th:text="${l.details != null ? l.details : '—'}">—</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script>
    function filterTable() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#logBody tr[data-search]').forEach(r => {
            r.style.display = (r.getAttribute('data-search') || '').includes(term) ? '' : 'none';
        });
    }
</script>
</body>
</html>
