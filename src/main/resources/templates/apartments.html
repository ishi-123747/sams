<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script th:src="@{/js/theme.js}"></script>
    <meta charset="UTF-8">
    <title>Apartments | SAMS</title>
    <link rel="stylesheet" th:href="@{/css/sams-global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--modal-overlay);z-index:1000;justify-content:center;align-items:center;}
        .modal-overlay.active{display:flex;}
        .modal{background:var(--surface-bg);color:var(--text-body);border-radius:12px;padding:30px;width:450px;max-width:90%;max-height:90vh;overflow-y:auto;}
        .modal h2{margin-bottom:20px;color:var(--text-heading);}
        .modal input,.modal select{width:100%;padding:10px;margin-bottom:12px;border:1px solid var(--input-border);border-radius:8px;font-size:14px;box-sizing:border-box;background:var(--surface-bg);color:var(--text-body);}
        .modal label{font-size:13px;color:var(--text-label);margin-bottom:4px;display:block;}
        .modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}
        .btn-cancel{padding:10px 20px;border:1px solid var(--input-border);border-radius:8px;background:var(--surface-bg);color:var(--text-body);cursor:pointer;}
        .btn-save{padding:10px 20px;border:none;border-radius:8px;background:#4f46e5;color:#fff;cursor:pointer;}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
        .empty-state i{font-size:48px;margin-bottom:15px;display:block;}
        .apt-photo{width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px;}
        .export-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;background:#16a34a;color:#fff;text-decoration:none;font-size:14px;font-weight:600;}
        .qr-btn{background:#ede9fe;color:#4f46e5;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;}
        .qr-modal{background:var(--surface-bg);border-radius:16px;padding:30px;text-align:center;width:300px;}
        .qr-modal h3{margin:0 0 16px;color:var(--text-heading);}
        .qr-modal p{color:var(--text-muted);font-size:13px;margin:12px 0 0;}
        .qr-container{display:flex;justify-content:center;margin:16px 0;}
        .download-qr{margin-top:16px;padding:10px 20px;background:#4f46e5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;width:100%;}
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="topbar">
            <div>
                <h1>🏢 Apartment Management</h1>
                <p>View and manage all apartments</p>
            </div>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                <a href="/export/apartments" class="export-btn"><i class="fas fa-download"></i> Export CSV</a>
                <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Apartment</button>
            </div>
        </div>
        <div class="stats">
            <div class="stat-card"><i class="fas fa-building"></i><div><h2 th:text="${totalCount}">0</h2><p>Total</p></div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><div><h2 th:text="${occupiedCount}">0</h2><p>Occupied</p></div></div>
            <div class="stat-card"><i class="fas fa-door-open"></i><div><h2 th:text="${vacantCount}">0</h2><p>Vacant</p></div></div>
            <div class="stat-card"><i class="fas fa-tools"></i><div><h2 th:text="${maintenanceCount}">0</h2><p>Maintenance</p></div></div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search apartment, location or tenant..." oninput="filterCards()">
            <button><i class="fas fa-search"></i></button>
        </div>
        <div class="apartment-grid" id="apartmentGrid">
            <div th:if="${#lists.isEmpty(apartments)}" class="empty-state">
                <i class="fas fa-building"></i>
                <p>No apartments added yet. Click <strong>Add Apartment</strong> to get started.</p>
            </div>
            <div class="apartment-card" th:each="a : ${apartments}"
                 th:attr="data-search=${#strings.toLowerCase(a.apartmentName + ' ' + a.apartmentNumber + ' ' + a.location + ' ' + (a.tenantName != null ? a.tenantName : ''))}">
                <img th:if="${a.imageUrl != null and !#strings.isEmpty(a.imageUrl)}" th:src="${a.imageUrl}" class="apt-photo" alt="Apartment">
                <div class="apt-header">
                    <h3 th:text="${a.apartmentNumber + ' – ' + a.apartmentName}">Apt</h3>
                    <span class="badge" th:classappend="${#strings.toLowerCase(a.status)}" th:text="${a.status}">Status</span>
                </div>
                <p><i class="fas fa-map-marker-alt"></i> <span th:text="${a.location}">—</span></p>
                <p><i class="fas fa-bed"></i> <span th:text="${a.rooms}">—</span> &nbsp;
                    <span th:text="${a.rent > 0 ? '₹' + a.rent + '/mo' : '—'}">—</span></p>
                <p><i class="fas fa-user"></i> <span th:text="${a.tenantName != null ? a.tenantName : '—'}">—</span></p>
                <div class="actions">
                    <button class="qr-btn"
                            th:attr="data-id=${a.id},data-number=${a.apartmentNumber},data-name=${a.apartmentName},data-location=${a.location},data-rent=${a.rent}"
                            onclick="showQRFromBtn(this)">
                        <i class="fas fa-qrcode"></i> QR
                    </button>
                    <button class="btn-edit" th:onclick="'openEditModal(' + ${a.id} + ')'"><i class="fas fa-pen"></i></button>
                    <form th:action="@{/apartments/delete/{id}(id=${a.id})}" method="post" style="margin:0;" onsubmit="return confirm('Delete this apartment?');">
                        <button type="submit" class="btn-delete"><i class="fas fa-trash"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="qrModal">
    <div class="qr-modal">
        <h3>📱 Apartment QR Code</h3>
        <div id="qrAptInfo" style="font-size:14px;color:var(--text-muted);margin-bottom:8px;"></div>
        <div class="qr-container">
            <div id="qrcode"></div>
        </div>
        <p>Scan to view apartment details</p>
        <button class="download-qr" onclick="downloadQR()"><i class="fas fa-download"></i> Download QR Code</button>
        <button class="btn-cancel" style="width:100%;margin-top:8px;" onclick="closeQR()">Close</button>
    </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h2>🏢 Add Apartment</h2>
        <form th:action="@{/apartments/add}" method="post" enctype="multipart/form-data">
            <input type="text" name="apartmentName" placeholder="Apartment Name (e.g. Sky Heights)" required>
            <input type="text" name="apartmentNumber" placeholder="Apartment Number (e.g. A101)" required>
            <input type="text" name="location" placeholder="Location" required>
            <input type="number" name="rooms" placeholder="Number of Rooms">
            <input type="number" name="rent" placeholder="Monthly Rent (₹)" step="0.01">
            <input type="number" name="deposit" placeholder="Deposit (₹)" step="0.01">
            <select name="status" required>
                <option value="">-- Select Status --</option>
                <option value="Occupied">Occupied</option>
                <option value="Vacant">Vacant</option>
                <option value="Maintenance">Maintenance</option>
            </select>
            <input type="text" name="tenantName" placeholder="Tenant Name (if occupied)">
            <label>Apartment Photo</label>
            <input type="file" name="imageFile" accept="image/*">
            <div class="modal-btns">
                <button type="button" class="btn-cancel" onclick="closeAddModal()">Cancel</button>
                <button type="submit" class="btn-save">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2>✏️ Edit Apartment</h2>
        <form th:action="@{/apartments/edit}" method="post" enctype="multipart/form-data">
            <input type="hidden" id="editId" name="id">
            <input type="text" id="editName" name="apartmentName" placeholder="Apartment Name" required>
            <input type="text" id="editNumber" name="apartmentNumber" placeholder="Apartment Number" required>
            <input type="text" id="editLocation" name="location" placeholder="Location" required>
            <input type="number" id="editRooms" name="rooms" placeholder="Number of Rooms">
            <input type="number" id="editRent" name="rent" placeholder="Monthly Rent (₹)" step="0.01">
            <input type="number" id="editDeposit" name="deposit" placeholder="Deposit (₹)" step="0.01">
            <select id="editStatus" name="status" required>
                <option value="">-- Select Status --</option>
                <option value="Occupied">Occupied</option>
                <option value="Vacant">Vacant</option>
                <option value="Maintenance">Maintenance</option>
            </select>
            <input type="text" id="editTenant" name="tenantName" placeholder="Tenant Name (if occupied)">
            <label>Replace Photo (optional)</label>
            <input type="file" name="imageFile" accept="image/*">
            <div class="modal-btns">
                <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button type="submit" class="btn-save">Save</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const apartments = /*[[${apartments}]]*/ [];
    let currentQR = null;

    function openAddModal(){document.getElementById('addModal').classList.add('active');}
    function closeAddModal(){document.getElementById('addModal').classList.remove('active');}

    function openEditModal(id){
        const a=apartments.find(x=>x.id===id); if(!a)return;
        document.getElementById('editId').value=a.id;
        document.getElementById('editName').value=a.apartmentName||'';
        document.getElementById('editNumber').value=a.apartmentNumber||'';
        document.getElementById('editLocation').value=a.location||'';
        document.getElementById('editRooms').value=a.rooms||'';
        document.getElementById('editRent').value=a.rent||'';
        document.getElementById('editDeposit').value=a.deposit||'';
        document.getElementById('editStatus').value=a.status||'';
        document.getElementById('editTenant').value=a.tenantName||'';
        document.getElementById('editModal').classList.add('active');
    }
    function closeEditModal(){document.getElementById('editModal').classList.remove('active');}

    function showQRFromBtn(btn) {
        const id = btn.getAttribute('data-id');
        const number = btn.getAttribute('data-number');
        const name = btn.getAttribute('data-name');
        const location = btn.getAttribute('data-location');
        const rent = btn.getAttribute('data-rent');
        showQR(id, number, name, location, rent);
    }

    function showQR(id, number, name, location, rent) {
        document.getElementById('qrAptInfo').innerHTML =
            '<strong>' + number + ' – ' + name + '</strong><br>' + location + ' | ₹' + rent + '/mo';
        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = '';
        const qrText = 'Apartment: ' + number + '\nName: ' + name + '\nLocation: ' + location + '\nRent: Rs.' + rent + '/month\nManaged by SAMS';
        currentQR = new QRCode(qrDiv, {
            text: qrText,
            width: 180,
            height: 180,
            colorDark: '#4f46e5',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });
        document.getElementById('qrModal').classList.add('active');
    }

    function closeQR() {
        document.getElementById('qrModal').classList.remove('active');
        document.getElementById('qrcode').innerHTML = '';
        currentQR = null;
    }

    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        if (!canvas) return;
        const link = document.createElement('a');
        link.download = 'apartment-qr.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    function filterCards(){
        const term=document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#apartmentGrid .apartment-card').forEach(c=>{
            c.style.display=(c.getAttribute('data-search')||'').includes(term)?'':'none';
        });
    }
</script>
</body>
</html>
