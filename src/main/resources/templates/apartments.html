<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Apartments | SAMS</title>
    <link rel="stylesheet" th:href="@{/css/sams-global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal { background:#fff; border-radius:12px; padding:30px; width:450px; max-width:90%; max-height:90vh; overflow-y:auto; }
        .modal h2 { margin-bottom:20px; }
        .modal input, .modal select { width:100%; padding:10px; margin-bottom:12px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; }
        .modal label { font-size:13px; color:#555; margin-bottom:4px; display:block; }
        .modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:10px; }
        .btn-cancel { padding:10px 20px; border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer; }
        .btn-save { padding:10px 20px; border:none; border-radius:8px; background:#4f46e5; color:#fff; cursor:pointer; }
        .empty-state { text-align:center; padding:60px 20px; color:#888; }
        .empty-state i { font-size:48px; margin-bottom:15px; display:block; }
        .apt-photo { width:100%; height:160px; object-fit:cover; border-radius:10px; margin-bottom:10px; }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="topbar">
            <div>
                <h1>🏢 Apartment Management</h1>
                <p>View and manage all apartments</p>
            </div>
            <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Apartment</button>
        </div>
        <div class="stats">
            <div class="stat-card"><i class="fas fa-building"></i><div><h2 id="totalCount">0</h2><p>Total</p></div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><div><h2 id="occupiedCount">0</h2><p>Occupied</p></div></div>
            <div class="stat-card"><i class="fas fa-door-open"></i><div><h2 id="vacantCount">0</h2><p>Vacant</p></div></div>
            <div class="stat-card"><i class="fas fa-tools"></i><div><h2 id="maintenanceCount">0</h2><p>Maintenance</p></div></div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search apartment, location or tenant..." oninput="filterCards()">
            <button><i class="fas fa-search"></i></button>
        </div>
        <div class="apartment-grid" id="apartmentGrid">
            <div class="empty-state"><i class="fas fa-building"></i><p>No apartments added yet. Click <strong>Add Apartment</strong> to get started.</p></div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="apartmentModal">
    <div class="modal">
        <h2 id="modalTitle">🏢 Add Apartment</h2>
        <input type="text" id="aptName" placeholder="Apartment Name (e.g. Sky Heights)">
        <input type="text" id="aptNumber" placeholder="Apartment Number (e.g. A101)">
        <input type="text" id="aptLocation" placeholder="Location">
        <input type="text" id="aptRooms" placeholder="Room Type (e.g. 2 BHK)">
        <input type="number" id="aptRent" placeholder="Monthly Rent (₹)">
        <select id="aptStatus">
            <option value="">-- Select Status --</option>
            <option value="Occupied">Occupied</option>
            <option value="Vacant">Vacant</option>
            <option value="Maintenance">Maintenance</option>
        </select>
        <input type="text" id="aptTenant" placeholder="Tenant Name (if occupied)">
        <label>Apartment Photo</label>
        <input type="file" id="aptPhoto" accept="image/*">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveApartment()">Save</button>
        </div>
    </div>
</div>

<script>
    let apartments = JSON.parse(localStorage.getItem('sams_apartments') || '[]');
    let editIndex = -1;

    function persist() { localStorage.setItem('sams_apartments', JSON.stringify(apartments)); }

    function openAddModal() {
        editIndex = -1;
        document.getElementById('modalTitle').textContent = '🏢 Add Apartment';
        clearForm();
        document.getElementById('apartmentModal').classList.add('active');
    }

    function openEditModal(i) {
        editIndex = i;
        const a = apartments[i];
        document.getElementById('modalTitle').textContent = '✏️ Edit Apartment';
        document.getElementById('aptName').value = a.name;
        document.getElementById('aptNumber').value = a.number;
        document.getElementById('aptLocation').value = a.location;
        document.getElementById('aptRooms').value = a.rooms;
        document.getElementById('aptRent').value = a.rent;
        document.getElementById('aptStatus').value = a.status;
        document.getElementById('aptTenant').value = a.tenant;
        document.getElementById('apartmentModal').classList.add('active');
    }

    function closeModal() { document.getElementById('apartmentModal').classList.remove('active'); clearForm(); }

    function saveApartment() {
        const name = document.getElementById('aptName').value.trim();
        const number = document.getElementById('aptNumber').value.trim();
        const location = document.getElementById('aptLocation').value.trim();
        const rooms = document.getElementById('aptRooms').value.trim();
        const rent = document.getElementById('aptRent').value.trim();
        const status = document.getElementById('aptStatus').value;
        const tenant = document.getElementById('aptTenant').value.trim();
        const photoFile = document.getElementById('aptPhoto').files[0];

        if (!name || !number || !location || !status) { alert('Please fill in Name, Number, Location and Status.'); return; }

        const saveData = (photo) => {
            if (editIndex === -1) {
                apartments.push({ name, number, location, rooms, rent, status, tenant, photo });
            } else {
                const oldPhoto = apartments[editIndex].photo;
                apartments[editIndex] = { name, number, location, rooms, rent, status, tenant, photo: photo || oldPhoto };
            }
            persist(); renderApartments(); updateStats(); clearForm(); closeModal();
        };

        if (photoFile) {
            const reader = new FileReader();
            reader.onload = (e) => saveData(e.target.result);
            reader.readAsDataURL(photoFile);
        } else { saveData(null); }
    }

    function renderApartments(filter = '') {
        const grid = document.getElementById('apartmentGrid');
        const filtered = apartments.map((a, i) => ({ ...a, i })).filter(a =>
            a.name.toLowerCase().includes(filter) ||
            a.number.toLowerCase().includes(filter) ||
            a.location.toLowerCase().includes(filter) ||
            a.tenant.toLowerCase().includes(filter)
        );
        if (filtered.length === 0) { grid.innerHTML = `<div class="empty-state"><i class="fas fa-building"></i><p>No apartments found.</p></div>`; return; }
        grid.innerHTML = filtered.map(a => `
            <div class="apartment-card">
                ${a.photo ? `<img src="${a.photo}" class="apt-photo">` : ''}
                <div class="apt-header">
                    <h3>${a.number} – ${a.name}</h3>
                    <span class="badge ${a.status.toLowerCase()}">${a.status}</span>
                </div>
                <p><i class="fas fa-map-marker-alt"></i> ${a.location}</p>
                <p><i class="fas fa-bed"></i> ${a.rooms || '—'} &nbsp; ${a.rent ? '₹' + Number(a.rent).toLocaleString() + '/mo' : '—'}</p>
                <p><i class="fas fa-user"></i> ${a.tenant || '—'}</p>
                <div class="actions">
                    <button class="btn-edit" onclick="openEditModal(${a.i})"><i class="fas fa-pen"></i></button>
                    <button class="btn-delete" onclick="deleteApartment(${a.i})"><i class="fas fa-trash"></i></button>
                </div>
            </div>`).join('');
    }

    function deleteApartment(index) {
        if (confirm('Delete this apartment?')) { apartments.splice(index, 1); persist(); renderApartments(); updateStats(); }
    }

    function updateStats() {
        document.getElementById('totalCount').textContent = apartments.length;
        document.getElementById('occupiedCount').textContent = apartments.filter(a => a.status === 'Occupied').length;
        document.getElementById('vacantCount').textContent = apartments.filter(a => a.status === 'Vacant').length;
        document.getElementById('maintenanceCount').textContent = apartments.filter(a => a.status === 'Maintenance').length;
    }

    function filterCards() { renderApartments(document.getElementById('searchInput').value.toLowerCase()); }

    function clearForm() {
        ['aptName','aptNumber','aptLocation','aptRooms','aptRent','aptTenant'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('aptStatus').value = '';
        document.getElementById('aptPhoto').value = '';
    }

    renderApartments(); updateStats();
</script>
</body>
</html>
