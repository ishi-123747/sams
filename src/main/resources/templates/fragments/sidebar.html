<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar" class="sidebar">

    <div class="logo">🏢 SAMS</div>

    <ul>
        <li th:classappend="${activePage == 'dashboard'} ? 'active'">
            <a th:href="@{/dashboard}"><i class="fas fa-chart-line"></i> Dashboard</a>
        </li>
        <li th:classappend="${activePage == 'apartments'} ? 'active'">
            <a th:href="@{/apartments}"><i class="fas fa-building"></i> Apartments</a>
        </li>
        <li th:classappend="${activePage == 'tenants'} ? 'active'">
            <a th:href="@{/tenants}"><i class="fas fa-users"></i> Tenants</a>
        </li>
        <li th:classappend="${activePage == 'bookings'} ? 'active'">
            <a th:href="@{/bookings}"><i class="fas fa-calendar-check"></i> Bookings</a>
        </li>
        <li th:classappend="${activePage == 'billing'} ? 'active'">
            <a th:href="@{/billing}"><i class="fas fa-file-invoice-dollar"></i> Billing</a>
        </li>
        <li th:classappend="${activePage == 'reports'} ? 'active'">
            <a th:href="@{/reports}"><i class="fas fa-chart-pie"></i> Reports</a>
        </li>
        <li th:classappend="${activePage == 'settings'} ? 'active'">
            <a th:href="@{/settings}"><i class="fas fa-cog"></i> Settings</a>
        </li>
        <li>
            <a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </li>
    </ul>

</div>
</body>
</html>
