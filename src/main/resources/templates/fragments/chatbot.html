<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="chatbot">
    <style>
        #chatBubble{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:2000;border:none;}
        #chatWindow{position:fixed;bottom:96px;right:24px;width:340px;height:460px;background:var(--surface-bg, #fff);border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,0.25);display:none;flex-direction:column;z-index:2000;overflow:hidden;}
        #chatWindow.active{display:flex;}
        .chat-header{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:14px 16px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;}
        .chat-header span{cursor:pointer;font-size:18px;}
        .chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--page-bg, #f9fafb);}
        .chat-msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.4;}
        .chat-msg.bot{background:#ede9fe;color:#3730a3;align-self:flex-start;border-bottom-left-radius:2px;}
        .chat-msg.user{background:#4f46e5;color:#fff;align-self:flex-end;border-bottom-right-radius:2px;}
        .chat-input-row{display:flex;border-top:1px solid var(--input-border, #e5e7eb);padding:10px;gap:8px;background:var(--surface-bg, #fff);}
        .chat-input-row input{flex:1;padding:10px;border:1px solid var(--input-border, #e5e7eb);border-radius:20px;font-size:13px;background:var(--surface-bg, #fff);color:var(--text-body, #111);}
        .chat-input-row button{background:#4f46e5;color:#fff;border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:14px;}
        .chat-suggestions{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px;}
        .chat-suggestion-chip{font-size:11px;background:#f3f4f6;color:#4b5563;padding:5px 10px;border-radius:14px;cursor:pointer;border:1px solid #e5e7eb;}
    </style>

    <button id="chatBubble" onclick="toggleChat()"><i class="fas fa-comment-dots"></i></button>

    <div id="chatWindow">
        <div class="chat-header">
            <span>🤖 SAMS Assistant</span>
            <span onclick="toggleChat()">&times;</span>
        </div>
        <div class="chat-suggestions">
            <span class="chat-suggestion-chip" onclick="askQuick('When is my rent due?')">Rent due?</span>
            <span class="chat-suggestion-chip" onclick="askQuick('How do I book an amenity?')">Book amenity</span>
            <span class="chat-suggestion-chip" onclick="askQuick('How do visitor OTP passes work?')">Visitor pass</span>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-msg bot">Hi! I'm your SAMS assistant. Ask me about rent, amenities, visitors, complaints, events, or emergencies.</div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Type your question..." onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        function toggleChat() {
            document.getElementById('chatWindow').classList.toggle('active');
        }

        function askQuick(text) {
            document.getElementById('chatInput').value = text;
            sendChat();
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            const body = document.getElementById('chatBody');
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-msg user';
            userDiv.textContent = text;
            body.appendChild(userDiv);
            input.value = '';
            body.scrollTop = body.scrollHeight;

            fetch('/chatbot/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'question=' + encodeURIComponent(text)
            })
                .then(res => res.json())
                .then(data => {
                    const botDiv = document.createElement('div');
                    botDiv.className = 'chat-msg bot';
                    botDiv.textContent = data.answer;
                    body.appendChild(botDiv);
                    body.scrollTop = body.scrollHeight;
                })
                .catch(() => {
                    const errDiv = document.createElement('div');
                    errDiv.className = 'chat-msg bot';
                    errDiv.textContent = 'Sorry, something went wrong. Please try again.';
                    body.appendChild(errDiv);
                    body.scrollTop = body.scrollHeight;
                });
        }
    </script>
</div>
</body>
</html>
