<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script th:src="@{/js/theme.js}"></script>
    <meta charset="UTF-8">
    <title>Documents | SAMS</title>
    <link rel="stylesheet" th:href="@{/css/sams-global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--modal-overlay);z-index:1000;justify-content:center;align-items:center;}
        .modal-overlay.active{display:flex;}
        .modal{background:var(--surface-bg);color:var(--text-body);border-radius:12px;padding:30px;width:450px;max-width:90%;max-height:90vh;overflow-y:auto;}
        .modal h2{margin-bottom:20px;color:var(--text-heading);}
        .modal input,.modal select{width:100%;padding:10px;margin-bottom:12px;border:1px solid var(--input-border);border-radius:8px;font-size:14px;box-sizing:border-box;background:var(--surface-bg);color:var(--text-body);}
        .modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}
        .btn-cancel{padding:10px 20px;border:1px solid var(--input-border);border-radius:8px;background:var(--surface-bg);color:var(--text-body);cursor:pointer;}
        .btn-save{padding:10px 20px;border:none;border-radius:8px;background:#4f46e5;color:#fff;cursor:pointer;}
        .doc-type{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;background:#ede9fe;color:#4f46e5;}
        .btn-delete-row{background:#fee2e2;color:#dc2626;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:12px;text-align:left;border-bottom:1px solid var(--input-border);font-size:14px;}
        th{color:var(--text-muted);font-weight:600;}
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="topbar">
            <div>
                <h1>📁 Document Management</h1>
                <p>Manage tenant documents and files</p>
            </div>
            <button class="add-btn" onclick="document.getElementById('uploadModal').classList.add('active')">
                <i class="fas fa-upload"></i> Upload Document
            </button>
        </div>

        <div class="stats">
            <div class="stat-card"><i class="fas fa-file"></i><div><h2 th:text="${totalCount}">0</h2><p>Total Documents</p></div></div>
        </div>

        <div style="background:var(--surface-bg);border-radius:14px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <table>
                <thead>
                <tr><th>Document</th><th>Type</th><th>Tenant</th><th>Apartment</th><th>Uploaded By</th><th>Date</th><th>Action</th></tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(documents)}">
                    <td colspan="7" style="text-align:center;padding:40px;color:#888;">No documents uploaded yet.</td>
                </tr>
                <tr th:each="d : ${documents}">
                    <td><i class="fas fa-file-alt" style="color:#4f46e5;margin-right:8px;"></i><span th:text="${d.documentName}">—</span></td>
                    <td><span class="doc-type" th:text="${d.documentType}">—</span></td>
                    <td th:text="${d.tenantName}">—</td>
                    <td th:text="${d.apartmentNumber}">—</td>
                    <td th:text="${d.uploadedBy}">—</td>
                    <td th:text="${d.uploadDate}">—</td>
                    <td>
                        <form th:action="@{/documents/delete/{id}(id=${d.id})}" method="post" style="display:inline;" onsubmit="return confirm('Delete this document?')">
                            <button type="submit" class="btn-delete-row"><i class="fas fa-trash"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
    <div class="modal">
        <h2>📁 Upload Document</h2>
        <form th:action="@{/documents/upload}" method="post" enctype="multipart/form-data">
            <input type="text" name="documentName" placeholder="Document Name (e.g. Aadhar Card)" required>
            <select name="documentType" required>
                <option value="">-- Document Type --</option>
                <option value="ID Proof">ID Proof</option>
                <option value="Address Proof">Address Proof</option>
                <option value="Lease Agreement">Lease Agreement</option>
                <option value="Police Verification">Police Verification</option>
                <option value="NOC">NOC</option>
                <option value="Other">Other</option>
            </select>
            <input type="text" name="tenantName" placeholder="Tenant Name" required>
            <input type="text" name="apartmentNumber" placeholder="Apartment Number" required>
            <input type="file" name="file" required>
            <div class="modal-btns">
                <button type="button" class="btn-cancel" onclick="document.getElementById('uploadModal').classList.remove('active')">Cancel</button>
                <button type="submit" class="btn-save">Upload</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
