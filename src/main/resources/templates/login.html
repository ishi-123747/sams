<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="skyline">
    <div class="building b1"></div>
    <div class="building b2"></div>
    <div class="building b3"></div>
    <div class="building b4"></div>
    <div class="building b5"></div>
    <div class="building b6"></div>
</div>

<div class="login-box">

    <div class="logo">🏢</div>
    <h1>SAMS</h1>
    <p>Service Apartment Management System</p>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="👤 Username" required>
        <input type="password" name="password" placeholder="🔒 Password" required>
        <button type="submit">Login 🚀</button>
    </form>

</div>
</body>
</html>
