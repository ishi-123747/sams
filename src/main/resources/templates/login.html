<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-msg {
            background: rgba(255,80,80,0.25);
            border: 1px solid rgba(255,100,100,0.5);
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="skyline">
    <div class="building b1"></div>
    <div class="building b2"></div>
    <div class="building b3"></div>
    <div class="building b4"></div>
    <div class="building b5"></div>
    <div class="building b6"></div>
</div>

<div class="login-box">
    <div class="logo">🏢</div>
    <h1>SAMS</h1>
    <p>Service Apartment Management System</p>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="👤 Username" required autocomplete="off">
        <input type="password" name="password" placeholder="🔒 Password" required>
        <button type="submit">Login 🚀</button>
    </form>
</div>
</body>
</html>
