<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script th:src="@{/js/theme.js}"></script>
    <meta charset="UTF-8">
    <title>My Documents | SAMS</title>
    <link rel="stylesheet" th:href="@{/css/sams-global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .page-box{background:var(--surface-bg);border-radius:14px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:24px;}
        .page-box h3{margin:0 0 18px;color:var(--text-heading);font-size:16px;}
        .doc-form input,.doc-form select{width:100%;padding:10px;border:1px solid var(--input-border);border-radius:8px;font-size:14px;background:var(--surface-bg);color:var(--text-body);box-sizing:border-box;margin-bottom:12px;}
        .submit-btn{padding:10px 24px;background:#4f46e5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;}
        .doc-type{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;background:#ede9fe;color:#4f46e5;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:12px;text-align:left;border-bottom:1px solid var(--input-border);font-size:14px;}
        th{color:var(--text-muted);font-weight:600;}
        .btn-delete-row{background:#fee2e2;color:#dc2626;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
    <main class="main-content">
        <div class="topbar">
            <div>
                <h1>📁 My Documents</h1>
                <p>Upload and manage your documents</p>
            </div>
        </div>

        <div class="page-box">
            <h3><i class="fas fa-upload" style="color:#4f46e5;margin-right:8px;"></i>Upload New Document</h3>
            <form th:action="@{/my-documents/upload}" method="post" enctype="multipart/form-data" class="doc-form">
                <input type="text" name="documentName" placeholder="Document Name (e.g. Aadhar Card)" required>
                <select name="documentType" required>
                    <option value="">-- Document Type --</option>
                    <option value="ID Proof">ID Proof</option>
                    <option value="Address Proof">Address Proof</option>
                    <option value="Lease Agreement">Lease Agreement</option>
                    <option value="Police Verification">Police Verification</option>
                    <option value="NOC">NOC</option>
                    <option value="Other">Other</option>
                </select>
                <input type="file" name="file" required>
                <button type="submit" class="submit-btn"><i class="fas fa-upload"></i> Upload</button>
            </form>
        </div>

        <div class="page-box">
            <h3><i class="fas fa-folder" style="color:#4f46e5;margin-right:8px;"></i>My Uploaded Documents</h3>
            <div th:if="${#lists.isEmpty(documents)}" style="text-align:center;padding:30px;color:var(--text-muted);">
                No documents uploaded yet.
            </div>
            <table th:if="${!#lists.isEmpty(documents)}">
                <thead>
                <tr><th>Document</th><th>Type</th><th>Date</th><th>Action</th></tr>
                </thead>
                <tbody>
                <tr th:each="d : ${documents}">
                    <td><i class="fas fa-file-alt" style="color:#4f46e5;margin-right:8px;"></i><span th:text="${d.documentName}">—</span></td>
                    <td><span class="doc-type" th:text="${d.documentType}">—</span></td>
                    <td th:text="${d.uploadDate}">—</td>
                    <td>
                        <form th:action="@{/documents/delete/{id}(id=${d.id})}" method="post" style="display:inline;" onsubmit="return confirm('Delete?')">
                            <button type="submit" class="btn-delete-row"><i class="fas fa-trash"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
