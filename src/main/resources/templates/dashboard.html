<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | SAMS</title>
    <link rel="stylesheet" th:href="@{/css/sams-global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="topbar">
            <div><h1>🏢 Dashboard</h1><p>Welcome to SAMS - Service Apartment Management System</p></div>
            <div class="user-info"><i class="fas fa-user-circle"></i><span>Admin</span></div>
        </div>
        <div class="stats">
            <div class="stat-card"><i class="fas fa-building"></i><div><h2 th:text="${totalApartments}">0</h2><p>Total Apartments</p></div></div>
            <div class="stat-card"><i class="fas fa-users"></i><div><h2 th:text="${totalTenants}">0</h2><p>Total Tenants</p></div></div>
            <div class="stat-card"><i class="fas fa-calendar-check"></i><div><h2 th:text="${totalBookings}">0</h2><p>Bookings</p></div></div>
            <div class="stat-card"><i class="fas fa-indian-rupee-sign"></i><div><h2 th:text="'₹'+${revenue}">₹0</h2><p>Revenue Collected</p></div></div>
        </div>
        <div class="dashboard-grid">
            <div class="dash-card">
                <h3><i class="fas fa-list"></i> Recent Payments</h3>
                <ul class="activity-list">
                    <li th:each="p : ${recentPayments}">
                        <i class="fas fa-circle-check"></i>
                        <span th:text="${p.tenantName + ' — ₹' + p.amount + ' (' + p.status + ')'}">Payment</span>
                    </li>
                    <li th:if="${#lists.isEmpty(recentPayments)}" style="color:#aaa;">No payment records yet.</li>
                </ul>
            </div>
            <div class="dash-card">
                <h3><i class="fas fa-chart-bar"></i> Quick Stats</h3>
                <ul class="activity-list">
                    <li><i class="fas fa-building"></i> Apartments: <strong th:text="${totalApartments}">0</strong></li>
                    <li><i class="fas fa-users"></i> Tenants: <strong th:text="${totalTenants}">0</strong></li>
                    <li><i class="fas fa-calendar"></i> Bookings: <strong th:text="${totalBookings}">0</strong></li>
                    <li><i class="fas fa-rupee-sign"></i> Revenue: <strong th:text="'₹'+${revenue}">₹0</strong></li>
                </ul>
            </div>
        </div>
    </main>
</div>
</body>
</html>
