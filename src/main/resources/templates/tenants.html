<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script th:src="@{/js/theme.js}"></script>
    <meta charset="UTF-8">
    <title>Tenants | SAMS</title>
    <link rel="stylesheet" th:href="@{/css/sams-global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--modal-overlay);z-index:1000;justify-content:center;align-items:center;}
        .modal-overlay.active{display:flex;}
        .modal{background:var(--surface-bg);color:var(--text-body);border-radius:12px;padding:30px;width:450px;max-width:90%;max-height:90vh;overflow-y:auto;}
        .modal h2{margin-bottom:20px;color:var(--text-heading);}
        .modal input,.modal select{width:100%;padding:10px;margin-bottom:12px;border:1px solid var(--input-border);border-radius:8px;font-size:14px;box-sizing:border-box;background:var(--surface-bg);color:var(--text-body);}
        .modal label{font-size:13px;color:var(--text-muted);margin-bottom:4px;display:block;}
        .modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}
        .btn-cancel{padding:10px 20px;border:1px solid var(--input-border);border-radius:8px;background:var(--surface-bg);color:var(--text-body);cursor:pointer;}
        .btn-save{padding:10px 20px;border:none;border-radius:8px;background:#4f46e5;color:#fff;cursor:pointer;}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
        .empty-state i{font-size:48px;margin-bottom:15px;display:block;}
        .export-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;background:#16a34a;color:#fff;text-decoration:none;font-size:14px;font-weight:600;}
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="topbar">
            <div>
                <h1>👥 Tenant Management</h1>
                <p>Manage all residents and occupancy details</p>
            </div>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                <a href="/export/tenants" class="export-btn"><i class="fas fa-download"></i> Export CSV</a>
                <button class="add-btn" onclick="openAddModal()"><i class="fas fa-user-plus"></i> Add Tenant</button>
            </div>
        </div>
        <div class="stats">
            <div class="stat-card"><i class="fas fa-users"></i><div><h2 th:text="${totalCount}">0</h2><p>Total Tenants</p></div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><div><h2 th:text="${activeCount}">0</h2><p>Active</p></div></div>
            <div class="stat-card"><i class="fas fa-user-slash"></i><div><h2 th:text="${inactiveCount}">0</h2><p>Inactive</p></div></div>
            <div class="stat-card"><i class="fas fa-building"></i><div><h2 th:text="${totalCount}">0</h2><p>Registered</p></div></div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search tenant name, apartment or phone..." oninput="filterCards()">
            <button><i class="fas fa-search"></i></button>
        </div>
        <div class="tenant-grid" id="tenantGrid">
            <div th:if="${#lists.isEmpty(tenants)}" class="empty-state">
                <i class="fas fa-users"></i>
                <p>No tenants added yet. Click <strong>Add Tenant</strong> to get started.</p>
            </div>
            <div class="tenant-card" th:each="t : ${tenants}"
                 th:attr="data-search=${#strings.toLowerCase(t.name + ' ' + (t.apartmentNumber != null ? t.apartmentNumber : '') + ' ' + (t.phone != null ? t.phone : ''))}">
                <div class="tenant-info">
                    <h3 th:text="${t.name}">Name</h3>
                    <span class="badge" th:classappend="${#strings.toLowerCase(t.status)}" th:text="${t.status}">Status</span>
                    <p><i class="fas fa-building"></i> Apt: <span th:text="${t.apartmentNumber}">—</span></p>
                    <p><i class="fas fa-phone"></i> <span th:text="${t.phone}">—</span></p>
                    <p><i class="fas fa-envelope"></i> <span th:text="${t.email != null ? t.email : '—'}">—</span></p>
                    <p><i class="fas fa-calendar"></i> Joined: <span th:text="${t.joinDate != null ? t.joinDate : '—'}">—</span></p>
                    <p><i class="fas fa-birthday-cake"></i> DOB: <span th:text="${t.dateOfBirth != null ? t.dateOfBirth : '—'}">—</span></p>
                    <p><i class="fas fa-id-card"></i> Aadhar: <span th:text="${t.aadhar != null ? t.aadhar : '—'}">—</span></p>
                </div>
                <div class="actions">
                    <button class="btn-edit" th:onclick="'openEditModal(' + ${t.id} + ')'"><i class="fas fa-pen"></i></button>
                    <form th:action="@{/tenants/delete/{id}(id=${t.id})}" method="post" style="margin:0;" onsubmit="return confirm('Delete this tenant?');">
                        <button type="submit" class="btn-delete"><i class="fas fa-trash"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h2>👤 Add Tenant</h2>
        <form th:action="@{/tenants/add}" method="post">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="text" name="apartmentNumber" placeholder="Apartment Number (e.g. A101)" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="email" name="email" placeholder="Email Address">
            <input type="text" name="aadhar" placeholder="Aadhar Number">
            <label>Date of Joining</label>
            <input type="date" name="joinDate">
            <label>Date of Birth 🎂</label>
            <input type="date" name="dateOfBirth">
            <select name="status" required>
                <option value="">-- Status --</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
            <div class="modal-btns">
                <button type="button" class="btn-cancel" onclick="closeAddModal()">Cancel</button>
                <button type="submit" class="btn-save">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2>✏️ Edit Tenant</h2>
        <form th:action="@{/tenants/edit}" method="post">
            <input type="hidden" id="editId" name="id">
            <input type="text" id="editName" name="name" placeholder="Full Name" required>
            <input type="text" id="editApartment" name="apartmentNumber" placeholder="Apartment Number" required>
            <input type="tel" id="editPhone" name="phone" placeholder="Phone Number" required>
            <input type="email" id="editEmail" name="email" placeholder="Email Address">
            <input type="text" id="editAadhar" name="aadhar" placeholder="Aadhar Number">
            <label>Date of Joining</label>
            <input type="date" id="editJoinDate" name="joinDate">
            <label>Date of Birth 🎂</label>
            <input type="date" id="editDob" name="dateOfBirth">
            <select id="editStatus" name="status" required>
                <option value="">-- Status --</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
            <div class="modal-btns">
                <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button type="submit" class="btn-save">Save</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const tenants=/*[[${tenants}]]*/[];
    function openAddModal(){document.getElementById('addModal').classList.add('active');}
    function closeAddModal(){document.getElementById('addModal').classList.remove('active');}
    function openEditModal(id){
        const t=tenants.find(x=>x.id===id); if(!t)return;
        document.getElementById('editId').value=t.id;
        document.getElementById('editName').value=t.name||'';
        document.getElementById('editApartment').value=t.apartmentNumber||'';
        document.getElementById('editPhone').value=t.phone||'';
        document.getElementById('editEmail').value=t.email||'';
        document.getElementById('editAadhar').value=t.aadhar||'';
        document.getElementById('editJoinDate').value=t.joinDate||'';
        document.getElementById('editDob').value=t.dateOfBirth||'';
        document.getElementById('editStatus').value=t.status||'';
        document.getElementById('editModal').classList.add('active');
    }
    function closeEditModal(){document.getElementById('editModal').classList.remove('active');}
    function filterCards(){
        const term=document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#tenantGrid .tenant-card').forEach(c=>{
            c.style.display=(c.getAttribute('data-search')||'').includes(term)?'':'none';
        });
    }
</script>
</body>
</html>
