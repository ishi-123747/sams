<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tenants | SAMS</title>
    <link rel="stylesheet" th:href="@{/css/sams-global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal { background:#fff; border-radius:12px; padding:30px; width:450px; max-width:90%; max-height:90vh; overflow-y:auto; }
        .modal h2 { margin-bottom:20px; }
        .modal input, .modal select { width:100%; padding:10px; margin-bottom:12px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; }
        .modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:10px; }
        .btn-cancel { padding:10px 20px; border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer; }
        .btn-save { padding:10px 20px; border:none; border-radius:8px; background:#4f46e5; color:#fff; cursor:pointer; }
        .empty-state { text-align:center; padding:60px 20px; color:#888; }
        .empty-state i { font-size:48px; margin-bottom:15px; display:block; }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="topbar">
            <div>
                <h1>👥 Tenant Management</h1>
                <p>Manage all residents and occupancy details</p>
            </div>
            <button class="add-btn" onclick="openAddModal()"><i class="fas fa-user-plus"></i> Add Tenant</button>
        </div>
        <div class="stats">
            <div class="stat-card"><i class="fas fa-users"></i><div><h2 id="totalCount">0</h2><p>Total Tenants</p></div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><div><h2 id="paidCount">0</h2><p>Paid</p></div></div>
            <div class="stat-card"><i class="fas fa-clock"></i><div><h2 id="pendingCount">0</h2><p>Pending</p></div></div>
            <div class="stat-card"><i class="fas fa-exclamation-triangle"></i><div><h2 id="overdueCount">0</h2><p>Overdue</p></div></div>
        </div>
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search tenant name, apartment or phone..." oninput="filterTenants()">
            <button><i class="fas fa-search"></i></button>
        </div>
        <div class="tenant-grid" id="tenantGrid">
            <div class="empty-state"><i class="fas fa-users"></i><p>No tenants added yet. Click <strong>Add Tenant</strong> to get started.</p></div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="tenantModal">
    <div class="modal">
        <h2 id="modalTitle">👤 Add Tenant</h2>
        <input type="text" id="tName" placeholder="Full Name">
        <input type="text" id="tApartment" placeholder="Apartment Number (e.g. A101)">
        <input type="tel" id="tPhone" placeholder="Phone Number">
        <input type="email" id="tEmail" placeholder="Email Address">
        <input type="text" id="tAadhar" placeholder="Aadhar Number">
        <input type="date" id="tJoinDate">
        <select id="tStatus">
            <option value="">-- Payment Status --</option>
            <option value="active">Paid</option>
            <option value="pending">Pending</option>
            <option value="overdue">Overdue</option>
        </select>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveTenant()">Save</button>
        </div>
    </div>
</div>

<script>
    let tenants = JSON.parse(localStorage.getItem('sams_tenants') || '[]');
    let editIndex = -1;

    function persist() { localStorage.setItem('sams_tenants', JSON.stringify(tenants)); }

    function openAddModal() {
        editIndex = -1;
        document.getElementById('modalTitle').textContent = '👤 Add Tenant';
        clearForm();
        document.getElementById('tenantModal').classList.add('active');
    }

    function openEditModal(i) {
        editIndex = i;
        const t = tenants[i];
        document.getElementById('modalTitle').textContent = '✏️ Edit Tenant';
        document.getElementById('tName').value = t.name;
        document.getElementById('tApartment').value = t.apartment;
        document.getElementById('tPhone').value = t.phone;
        document.getElementById('tEmail').value = t.email;
        document.getElementById('tAadhar').value = t.aadhar;
        document.getElementById('tJoinDate').value = t.joinDate;
        document.getElementById('tStatus').value = t.status;
        document.getElementById('tenantModal').classList.add('active');
    }

    function closeModal() { document.getElementById('tenantModal').classList.remove('active'); clearForm(); }

    function saveTenant() {
        const name = document.getElementById('tName').value.trim();
        const apartment = document.getElementById('tApartment').value.trim();
        const phone = document.getElementById('tPhone').value.trim();
        const email = document.getElementById('tEmail').value.trim();
        const aadhar = document.getElementById('tAadhar').value.trim();
        const joinDate = document.getElementById('tJoinDate').value;
        const status = document.getElementById('tStatus').value;

        if (!name || !apartment || !phone || !status) { alert('Please fill in Name, Apartment, Phone and Status.'); return; }

        if (editIndex === -1) {
            tenants.push({ name, apartment, phone, email, aadhar, joinDate, status });
        } else {
            tenants[editIndex] = { name, apartment, phone, email, aadhar, joinDate, status };
        }
        persist(); renderTenants(); updateStats(); clearForm(); closeModal();
    }

    function renderTenants(filter = '') {
        const grid = document.getElementById('tenantGrid');
        const filtered = tenants.map((t, i) => ({ ...t, i })).filter(t =>
            t.name.toLowerCase().includes(filter) ||
            t.apartment.toLowerCase().includes(filter) ||
            t.phone.includes(filter)
        );
        if (filtered.length === 0) { grid.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>No tenants found.</p></div>`; return; }
        const statusLabel = { active: 'Paid', pending: 'Pending', overdue: 'Overdue' };
        grid.innerHTML = filtered.map(t => `
            <div class="tenant-card">
                <div class="tenant-info">
                    <h3>${t.name}</h3>
                    <span class="badge ${t.status}">${statusLabel[t.status]}</span>
                    <p><i class="fas fa-building"></i> Apartment ${t.apartment}</p>
                    <p><i class="fas fa-phone"></i> ${t.phone}</p>
                    <p><i class="fas fa-envelope"></i> ${t.email || '—'}</p>
                    <p><i class="fas fa-calendar"></i> Joined: ${t.joinDate || '—'}</p>
                    <p><i class="fas fa-id-card"></i> Aadhar: ${t.aadhar || '—'}</p>
                </div>
                <div class="actions">
                    <button class="btn-edit" onclick="openEditModal(${t.i})"><i class="fas fa-pen"></i></button>
                    <button class="btn-delete" onclick="deleteTenant(${t.i})"><i class="fas fa-trash"></i></button>
                </div>
            </div>`).join('');
    }

    function deleteTenant(index) {
        if (confirm('Delete this tenant?')) { tenants.splice(index, 1); persist(); renderTenants(); updateStats(); }
    }

    function updateStats() {
        document.getElementById('totalCount').textContent = tenants.length;
        document.getElementById('paidCount').textContent = tenants.filter(t => t.status === 'active').length;
        document.getElementById('pendingCount').textContent = tenants.filter(t => t.status === 'pending').length;
        document.getElementById('overdueCount').textContent = tenants.filter(t => t.status === 'overdue').length;
    }

    function filterTenants() { renderTenants(document.getElementById('searchInput').value.toLowerCase()); }

    function clearForm() {
        ['tName','tApartment','tPhone','tEmail','tAadhar','tJoinDate'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('tStatus').value = '';
    }

    renderTenants(); updateStats();
</script>
</body>
</html>
