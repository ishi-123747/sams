<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invoice | SAMS</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;padding:40px;color:#222;background:#fff;}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;padding-bottom:20px;border-bottom:2px solid #4f46e5;}
        .brand{font-size:28px;font-weight:700;color:#4f46e5;}
        .brand span{display:block;font-size:13px;font-weight:400;color:#666;}
        .invoice-title{text-align:right;}
        .invoice-title h2{font-size:22px;color:#4f46e5;}
        .invoice-title p{font-size:13px;color:#666;}
        .info-row{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:30px;}
        .info-box h4{font-size:12px;text-transform:uppercase;color:#888;margin-bottom:8px;letter-spacing:1px;}
        .info-box p{font-size:15px;color:#222;margin-bottom:4px;}
        table{width:100%;border-collapse:collapse;margin-bottom:30px;}
        th{background:#4f46e5;color:#fff;padding:12px 16px;text-align:left;font-size:13px;}
        td{padding:12px 16px;border-bottom:1px solid #eee;font-size:14px;}
        .total-row{background:#f8f7ff;}
        .total-row td{font-weight:700;font-size:16px;color:#4f46e5;}
        .status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
        .paid{background:#dcfce7;color:#16a34a;}
        .pending{background:#fef9c3;color:#ca8a04;}
        .overdue{background:#fee2e2;color:#dc2626;}
        .footer{text-align:center;color:#888;font-size:12px;margin-top:40px;padding-top:20px;border-top:1px solid #eee;}
        .print-btn{position:fixed;bottom:30px;right:30px;background:#4f46e5;color:#fff;border:none;padding:14px 28px;border-radius:10px;cursor:pointer;font-size:15px;box-shadow:0 4px 15px rgba(79,70,229,0.4);}
        @media print{.print-btn{display:none;} body{padding:20px;}}
    </style>
</head>
<body>
<div class="header">
    <div class="brand">🏢 SAMS<span>Service Apartment Management System</span></div>
    <div class="invoice-title">
        <h2>INVOICE</h2>
        <p th:text="${'#' + payment.invoiceId}">—</p>
    </div>
</div>

<div class="info-row">
    <div class="info-box">
        <h4>Bill To</h4>
        <p th:text="${payment.tenantName}">—</p>
        <p th:text="${'Apt: ' + payment.apartmentNumber}">—</p>
    </div>
    <div class="info-box" style="text-align:right;">
        <h4>Invoice Details</h4>
        <p>Due Date: <strong th:text="${payment.dueDate != null ? payment.dueDate : '—'}">—</strong></p>
        <p>Status: <span class="status-badge" th:classappend="${payment.status}" th:text="${payment.status}">—</span></p>
    </div>
</div>

<table>
    <thead>
    <tr><th>Description</th><th>Amount</th></tr>
    </thead>
    <tbody>
    <tr>
        <td>Monthly Rent — <span th:text="${payment.apartmentNumber}">—</span></td>
        <td th:text="${'₹' + payment.amount}">—</td>
    </tr>
    <tr class="total-row">
        <td>Total</td>
        <td th:text="${'₹' + payment.amount}">—</td>
    </tr>
    </tbody>
</table>

<div class="footer">
    <p>Thank you for your payment! — SAMS Management</p>
    <p>Generated on <span th:text="${#dates.format(#dates.createNow(), 'dd MMM yyyy')}">—</span></p>
</div>

<button class="print-btn" onclick="window.print()">🖨️ Print Invoice</button>
</body>
</html>
