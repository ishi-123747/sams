<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script th:src="@{/js/theme.js}"></script>
    <meta charset="UTF-8">
    <title>Bookings | SAMS</title>
    <link rel="stylesheet" th:href="@{/css/sams-global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--modal-overlay);z-index:1000;justify-content:center;align-items:center;}
        .modal-overlay.active{display:flex;}
        .modal{background:var(--surface-bg);color:var(--text-body);border-radius:12px;padding:30px;width:450px;max-width:90%;max-height:90vh;overflow-y:auto;}
        .modal h2{margin-bottom:20px;color:var(--text-heading);}
        .modal input,.modal select{width:100%;padding:10px;margin-bottom:12px;border:1px solid var(--input-border);border-radius:8px;font-size:14px;box-sizing:border-box;background:var(--surface-bg);color:var(--text-body);}
        .modal label{font-size:13px;color:var(--text-label);margin-bottom:4px;display:block;}
        .modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}
        .btn-cancel{padding:10px 20px;border:1px solid var(--input-border);border-radius:8px;background:var(--surface-bg);color:var(--text-body);cursor:pointer;}
        .btn-save{padding:10px 20px;border:none;border-radius:8px;background:#4f46e5;color:#fff;cursor:pointer;}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
        .empty-state i{font-size:48px;margin-bottom:15px;display:block;}
        .export-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;background:#16a34a;color:#fff;text-decoration:none;font-size:14px;font-weight:600;}
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="topbar">
            <div>
                <h1>📅 Booking Management</h1>
                <p>Manage reservations and apartment occupancy</p>
            </div>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                <a href="/export/bookings" class="export-btn"><i class="fas fa-download"></i> Export CSV</a>
                <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> New Booking</button>
            </div>
        </div>
        <div class="stats">
            <div class="stat-card"><i class="fas fa-calendar-check"></i><div><h2 th:text="${totalCount}">0</h2><p>Total Bookings</p></div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><div><h2 th:text="${confirmedCount}">0</h2><p>Confirmed</p></div></div>
            <div class="stat-card"><i class="fas fa-clock"></i><div><h2 th:text="${pendingCount}">0</h2><p>Pending</p></div></div>
            <div class="stat-card"><i class="fas fa-flag-checkered"></i><div><h2 th:text="${completedCount}">0</h2><p>Completed</p></div></div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search booking, guest or apartment..." oninput="filterCards()">
            <button><i class="fas fa-search"></i></button>
        </div>
        <div class="booking-grid" id="bookingGrid">
            <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
                <i class="fas fa-calendar-check"></i>
                <p>No bookings yet. Click <strong>New Booking</strong> to get started.</p>
            </div>
            <div class="booking-card" th:each="b : ${bookings}"
                 th:attr="data-search=${#strings.toLowerCase(b.tenantName + ' ' + b.apartmentNumber)}">
                <div class="booking-content">
                    <div class="guest">
                        <div>
                            <h3 th:text="${b.tenantName}">Guest</h3>
                            <p th:text="${b.apartmentNumber}">Apt</p>
                        </div>
                    </div>
                    <span class="status" th:classappend="${#strings.toLowerCase(b.status)}" th:text="${b.status}">Status</span>
                    <div class="dates">
                        <div><strong>Check In</strong><p th:text="${b.checkInDate!=null?b.checkInDate:'—'}">—</p></div>
                        <div><strong>Check Out</strong><p th:text="${b.checkOutDate!=null?b.checkOutDate:'—'}">—</p></div>
                    </div>
                    <div class="price" th:text="${b.amount>0?'₹'+b.amount:'—'}">—</div>
                    <div class="actions">
                        <button class="btn-edit" th:onclick="'openEditModal('+${b.id}+')'"><i class="fas fa-pen"></i></button>
                        <form th:action="@{/bookings/delete/{id}(id=${b.id})}" method="post" style="margin:0;" onsubmit="return confirm('Delete this booking?');">
                            <button type="submit" class="btn-delete"><i class="fas fa-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h2>📅 New Booking</h2>
        <form th:action="@{/bookings/add}" method="post">
            <input type="text" name="tenantName" placeholder="Guest / Tenant Name" required>
            <input type="text" name="apartmentNumber" placeholder="Apartment Number (e.g. A101)" required>
            <input type="number" name="amount" placeholder="Amount (₹)" step="0.01">
            <label>Check In</label>
            <input type="date" name="checkInDate">
            <label>Check Out</label>
            <input type="date" name="checkOutDate">
            <select name="status" required>
                <option value="">-- Status --</option>
                <option value="confirmed">Confirmed</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
            </select>
            <div class="modal-btns">
                <button type="button" class="btn-cancel" onclick="closeAddModal()">Cancel</button>
                <button type="submit" class="btn-save">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2>✏️ Edit Booking</h2>
        <form th:action="@{/bookings/edit}" method="post">
            <input type="hidden" id="editId" name="id">
            <input type="text" id="editGuest" name="tenantName" placeholder="Guest / Tenant Name" required>
            <input type="text" id="editApartment" name="apartmentNumber" placeholder="Apartment Number" required>
            <input type="number" id="editAmount" name="amount" placeholder="Amount (₹)" step="0.01">
            <label>Check In</label>
            <input type="date" id="editCheckIn" name="checkInDate">
            <label>Check Out</label>
            <input type="date" id="editCheckOut" name="checkOutDate">
            <select id="editStatus" name="status" required>
                <option value="">-- Status --</option>
                <option value="confirmed">Confirmed</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
            </select>
            <div class="modal-btns">
                <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button type="submit" class="btn-save">Save</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const bookings=/*[[${bookings}]]*/[];
    function openAddModal(){document.getElementById('addModal').classList.add('active');}
    function closeAddModal(){document.getElementById('addModal').classList.remove('active');}
    function openEditModal(id){
        const b=bookings.find(x=>x.id===id); if(!b)return;
        document.getElementById('editId').value=b.id;
        document.getElementById('editGuest').value=b.tenantName||'';
        document.getElementById('editApartment').value=b.apartmentNumber||'';
        document.getElementById('editAmount').value=b.amount||'';
        document.getElementById('editCheckIn').value=b.checkInDate||'';
        document.getElementById('editCheckOut').value=b.checkOutDate||'';
        document.getElementById('editStatus').value=b.status||'';
        document.getElementById('editModal').classList.add('active');
    }
    function closeEditModal(){document.getElementById('editModal').classList.remove('active');}
    function filterCards(){
        const term=document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#bookingGrid .booking-card').forEach(c=>{
            c.style.display=(c.getAttribute('data-search')||'').includes(term)?'':'none';
        });
    }
</script>
</body>
</html>
